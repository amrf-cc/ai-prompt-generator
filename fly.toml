# Fly.io app configuration. Replace `app` with the name `fly launch` assigns
# (or set it explicitly with `fly apps create <name>` first).
app = "ccc-prompt-gen"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  HOSTNAME = "0.0.0.0"
  DATA_DIR = "/app/data/data"
  BRANDS_DIR = "/app/data/brands"
  CONFIG_DIR = "/app/data/config"
  UPLOADS_DIR = "/app/data/uploads"
  ALLOWED_EMAIL_DOMAIN = "chipcitycookies.com"
  LOCKED_BRAND_SLUGS = "chip-city"
  AUTH_TRUST_HOST = "true"

# Persistent volume — holds the SQLite DB, seeded brands, config, and uploads.
# Create with: fly volumes create ccc_prompt_data --size 5 --region iad
[[mounts]]
  source = "ccc_prompt_data"
  destination = "/app/data"
  initial_size = "5gb"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  # Generous timeouts for SSE prompt generation streams.
  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
